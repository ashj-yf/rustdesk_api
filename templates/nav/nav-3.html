<!-- 样式共用 nav2 样式，避免新增 CSS -->
{% load static %}

<div class="nav3-tabs">
    <button type="button" class="nav3-tab{% if tab != 'groups' %} nav3-tab--active{% endif %}" data-tab="users">
        用户列表
    </button>
    <button type="button" class="nav3-tab{% if tab == 'groups' %} nav3-tab--active{% endif %}" data-tab="groups">
        用户组
    </button>
</div>

{% if tab == 'groups' %}
    {% include "nav/nav-3-groups.html" %}
{% else %}
    {% include "nav/nav-3-users.html" %}
{% endif %}
